<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#000000"/>
  
  <!-- Cake/Pastry icon in gold -->
  <g fill="#D4AF37">
    <!-- Bottom layer -->
    <ellipse cx="50" cy="70" rx="28" ry="6" opacity="0.8"/>
    <rect x="22" y="60" width="56" height="10" rx="2"/>
    
    <!-- Middle layer -->
    <ellipse cx="50" cy="55" rx="24" ry="5" opacity="0.8"/>
    <rect x="26" y="46" width="48" height="9" rx="2"/>
    
    <!-- Top layer -->
    <ellipse cx="50" cy="42" rx="20" ry="4" opacity="0.8"/>
    <rect x="30" y="34" width="40" height="8" rx="2"/>
    
    <!-- Cherry on top -->
    <circle cx="50" cy="28" r="4" fill="#DC143C"/>
    <path d="M50 28 Q48 24 46 22" stroke="#228B22" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="35" cy="52" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="42" cy="52" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="58" cy="52" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="65" cy="52" r="1.5" fill="#FFD700" opacity="0.6"/>
</svg>
